<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes List</title>
<!-- Connect CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <!-- Main title -->
    <h1>Notes List</h1>
    <!-- Instructions -->
    <p>Add and remove notes dynamically.</p>
    <!-- Input and button -->
    <div class="input-container">
        <input type="text" id="noteInput" placeholder="Write a note">
        <button id="addButton">Add</button>
    </div>

    <!-- Notes list -->
    <ul id="notesList"></ul>
</div>
<!-- Connect JavaScript file -->
<script src="manipulacion_dom.js"></script>
</body>
</html>
